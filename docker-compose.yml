version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: kevin_website
      MYSQL_USER: kevin_user
      MYSQL_PASSWORD: kevin_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: kevin_user
      PMA_PASSWORD: kevin_password
    ports:
      - "8081:80"
    depends_on:
      - mysql